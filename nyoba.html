<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Kilat Kana - Hiragana & Katakana</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            padding: 30px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            color: var(--text);
            font-size: 24px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .tabs {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 12px;
        }

        .score-box {
            flex: 1;
            background: #f8fafc;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }

        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .score-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin-top: 4px;
        }

        .char-display {
            background: #f1f5f9;
            height: 200px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 100px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 28px;
            border: 2px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .opt-btn {
            background: var(--card-bg);
            border: 2px solid #e2e8f0;
            padding: 18px;
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .opt-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: #fefeff;
            transform: translateY(-2px);
        }

        /* State Jawaban Backend Logic */
        .opt-btn.correct {
            background: var(--success) !important;
            border-color: var(--success) !important;
            color: white !important;
            animation: pulse 0.3s ease;
        }

        .opt-btn.wrong {
            background: var(--danger) !important;
            border-color: var(--danger) !important;
            color: white !important;
            animation: shake 0.4s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

        <button class="tab-btn" onclick="changeMode('mixed', this)">Campuran</button>
    </div>

    <div class="scoreboard">
        <div class="score-box">

        </div>
        <div class="score-box">
            <div class="score-label">Streak Tertinggi 🔥</div>
            <div class="score-value" id="highStreak">0</div>
        </div>
    </div>

    <div class="char-display" id="charDisplay">-</div>

    <div class="options-grid" id="optionsGrid">
        <!-- Generasi Otomatis oleh Engine Javascript -->
    </div>
</div>
